<!DOCTYPE html>
<html>
<head>

<title>{% block title %}Mi Sistema{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* VARIABLES DE COLOR */
:root{
--color-principal:#e9bec8;
--color-secundario:#f0d4da;
--color-hover:#e2aeb8;
--color-fondo:#fff6f9;
--color-boton:#ff7aa2;
}

/* BODY */
body{
font-family:Poppins;
background:var(--color-fondo);
}

/* NAVBAR */
.navbar-cute{
background:linear-gradient(135deg,var(--color-secundario),var(--color-principal));
box-shadow:0 6px 20px rgba(0,0,0,.15);
padding:12px 0;
}

/* LOGO */
.navbar-brand{
font-weight:600;
font-size:22px;
letter-spacing:.5px;
}

/* LINKS */
.navbar .nav-link{
color:white !important;
font-weight:500;
margin-right:10px;
transition:all .25s;
border-radius:12px;
padding:8px 14px;
}

.navbar .nav-link:hover{
background:rgba(255,255,255,.25);
transform:translateY(-2px);
}

/* BOTON LOGIN */
.btn-login{
background:white;
color:var(--color-boton);
border-radius:25px;
padding:6px 18px;
font-weight:500;
transition:all .3s;
}

.btn-login:hover{
background:#ffe4ec;
color:var(--color-boton);
transform:scale(1.05);
}

/* DROPDOWN */
.dropdown-menu{
border:none;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.dropdown-item:hover{
background:#ffe6ef;
}

/* SELECTOR DE COLOR */
.color-picker{
display:flex;
align-items:center;
gap:6px;
margin-left:15px;
color:white;
}

.color-picker input{
width:35px;
height:30px;
border:none;
background:none;
cursor:pointer;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-cute">

<div class="container">

<a class="navbar-brand text-white" href="/">
<img src="/static/logonav.png" alt="Logo" width="120" height="30" class="d-inline-block align-text-top">
</a>

<!-- selector color -->
<div class="color-picker">
<span id="abrirColor" style="cursor:pointer;font-size:20px;">🎨</span>
<input type="color" id="colorTema" style="display:none;">
</div>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContenido">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarContenido">

<ul class="navbar-nav me-auto">

<li class="nav-item">
<a class="nav-link" href="/">Inicio</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/chat/general">Chat</a>
</li>

</ul>

<ul class="navbar-nav">

{% if session.get("usuario") %}

<li class="nav-item dropdown">

<a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
{{session["usuario"]}}
</a>

<ul class="dropdown-menu dropdown-menu-end">

<li>
<a class="dropdown-item" href="/logout">
Cerrar sesión
</a>
</li>

</ul>

</li>

{% else %}

<li class="nav-item">
<a class="btn btn-login" href="/login">
Iniciar sesión
</a>
</li>

{% endif %}

</ul>

</div>
</div>
</nav>

<div class="container mt-4">

{% block contenido %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* CAMBIAR COLOR DEL TEMA */

const picker = document.getElementById("colorTema");

function aplicarColor(color){

document.documentElement.style.setProperty("--color-principal", color);
document.documentElement.style.setProperty("--color-secundario", color + "aa");
document.documentElement.style.setProperty("--color-hover", color);
document.documentElement.style.setProperty("--color-boton", color);

localStorage.setItem("temaColor", color);
}

picker.addEventListener("input", e=>{
aplicarColor(e.target.value);
});

/* CARGAR COLOR GUARDADO */

const guardado = localStorage.getItem("temaColor");

if(guardado){
aplicarColor(guardado);
picker.value = guardado;
}
const abrirColor = document.getElementById("abrirColor");

abrirColor.addEventListener("click", () => {
    picker.click();
});
</script>

</body>
</html>
