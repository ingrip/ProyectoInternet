<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Plati-cats</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
.btn-empezar{
margin-top:30px;
padding:16px 40px;
border-radius:40px;
font-size:20px;
background:linear-gradient(90deg,#ff9aa2,#ffc3a0);
color:white;
text-decoration:none;
font-weight:600;
box-shadow:0 8px 20px rgba(0,0,0,.15);
transition:.3s;
}

.btn-empezar:hover{
transform:scale(1.08);
}
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fbbcbf,#ffd6ec,#c2f0ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
}

.logo{
width:260px;
animation:flotar 3s ease-in-out infinite;
}

@keyframes flotar{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

h1{
margin-top:20px;
font-weight:600;
color:#333;
}

button{
margin-top:30px;
padding:14px 35px;
border:none;
border-radius:30px;
font-size:18px;
background:linear-gradient(90deg,#e08989,#dba76d);
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

</style>
</head>

<body>

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<h1>Bienvenido a Plati-cats </h1>

<a href="/chat/general">
<button class="btn-empezar" onclick="empezar()">Empezar</button>
</a>

</body><script>

function empezar(){

const usuario = localStorage.getItem("usuario");

if(usuario){
    // ya inició sesión
    window.location.href="/chat/general";
}else{
    // no hay sesión
    window.location.href="/login";
}

}

</script>
</html>
